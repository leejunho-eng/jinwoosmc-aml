<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진우에스엠씨AML</title>
    <!-- Supabase JS 클라이언트 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 설정 파일 (별도 관리) -->
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="number"],
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #5a6268;
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            padding: 8px 15px;
            font-size: 14px;
            margin-top: 5px;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .result-container {
            margin-top: 25px;
            display: none;
        }

        .result-container.show {
            display: block;
        }

        .result-item {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .result-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .password-text {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            word-break: break-all;
            margin-bottom: 10px;
        }

        .copy-btn {
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .copy-btn.copied {
            background: #4caf50;
        }

        .calculation {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 13px;
            color: #555;
        }

        .calculation-item {
            margin-bottom: 8px;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            font-size: 14px;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            font-size: 14px;
        }

        .success-message.show {
            display: block;
        }

        .security-code-info {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
            color: #1976d2;
        }

        .user-list {
            margin-top: 15px;
        }

        .user-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-name {
            font-weight: 500;
            color: #333;
        }

        .logout-btn {
            background: #6c757d;
            padding: 8px 15px;
            font-size: 12px;
            margin-top: 10px;
        }

        .admin-link {
            text-align: center;
            margin-top: 15px;
        }

        .admin-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .admin-link a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .password-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="runtimeBadge" style="position: fixed; top: 10px; right: 10px; z-index: 9999; background: #c62828; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;">
        JS 미실행
    </div>

    <!-- 로그인 화면 -->
    <div class="container" id="loginScreen">
        <h1>진우에스엠씨AML</h1>
        <h2>로그인</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="loginUsername">사용자명:</label>
                <input type="text" id="loginUsername" required placeholder="사용자명 입력">
            </div>

            <div class="form-group">
                <label for="loginPassword">비밀번호:</label>
                <input type="password" id="loginPassword" required placeholder="비밀번호 입력">
            </div>

            <button type="submit" class="btn">로그인</button>
        </form>

        <div class="error-message" id="loginError"></div>
        <div class="admin-link">
            <a href="#" id="adminModeLink">관리자 모드</a>
        </div>
    </div>

    <!-- 관리자 비밀번호 입력 화면 -->
    <div class="container hidden" id="adminPasswordScreen">
        <h1>진우에스엠씨AML</h1>
        <h2>관리자 비밀번호 입력</h2>
        
        <form id="adminPasswordForm">
            <div class="form-group">
                <label for="adminPassword">관리자 비밀번호:</label>
                <input type="password" id="adminPassword" required placeholder="관리자 비밀번호 입력">
            </div>

            <button type="submit" class="btn">확인</button>
        </form>

        <div class="error-message" id="adminPasswordError"></div>
        <button id="adminBackButton" class="btn btn-secondary logout-btn" type="button">로그인 화면으로</button>
    </div>

    <!-- 관리자 패널 -->
    <div class="container hidden" id="adminPanel">
        <h1>진우에스엠씨AML</h1>
        
        <h2>사용자 등록</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="newUsername">사용자명:</label>
                <input type="text" id="newUsername" required placeholder="새 사용자명 입력">
            </div>

            <div class="form-group">
                <label for="newPassword">비밀번호:</label>
                <input type="password" id="newPassword" required placeholder="비밀번호 입력">
            </div>

            <button type="submit" class="btn">사용자 등록</button>
        </form>

        <div class="error-message" id="registerError"></div>
        <div class="success-message" id="registerSuccess"></div>

        <h2 style="margin-top: 30px;">등록된 사용자 목록</h2>
        <div class="user-list" id="userList"></div>

        <button id="panelBackButton" class="btn btn-secondary logout-btn" type="button">로그인 화면으로</button>
    </div>

    <!-- 비밀번호 생성기 화면 -->
    <div class="container hidden" id="generatorScreen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0;">진우에스엠씨AML</h1>
            <div style="display: flex; gap: 8px;">
                <button id="generatorAdminButton" class="btn btn-secondary logout-btn hidden" type="button" style="width: auto; padding: 8px 15px; margin: 0;">관리자 모드</button>
                <button id="generatorLogoutButton" class="btn btn-secondary logout-btn" type="button" style="width: auto; padding: 8px 15px; margin: 0;">로그아웃</button>
            </div>
        </div>
        
        <form id="passwordForm">
            <div class="form-group">
                <label for="year">연도 (Year):</label>
                <input type="number" id="year" min="0" max="99" required placeholder="0-99 사이 입력 (예: 25)">
            </div>

            <div class="form-group">
                <label for="month">월 (Month):</label>
                <input type="number" id="month" min="1" max="12" required placeholder="1-12 사이 입력">
            </div>

            <div class="form-group">
                <label for="day">일 (Day):</label>
                <input type="number" id="day" min="1" max="31" required placeholder="1-31 사이 입력">
            </div>

            <div class="form-group">
                <label for="securityCodeNum">보안코드 번호:</label>
                <input type="number" id="securityCodeNum" min="1" max="30" required placeholder="1-30 사이 입력">
            </div>

            <button type="submit" class="btn">비밀번호 생성</button>
        </form>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-container" id="resultContainer">
            <div class="result-item">
                <div class="result-label">설정비밀번호:</div>
                <div class="password-text" id="password1"></div>
                <button class="copy-btn" type="button" data-password-id="password1">복사</button>
            </div>

            <div class="result-item">
                <div class="result-label">점검 비밀번호:</div>
                <div class="password-text" id="password2"></div>
                <button class="copy-btn" type="button" data-password-id="password2">복사</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
